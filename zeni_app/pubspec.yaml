name: zeni_app
description: Zeni AI Assistant
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core
  http: ^1.2.1
  shared_preferences: ^2.2.2
  device_info_plus: ^10.1.0

  # Voice & AI interaction (future-ready)
  speech_to_text: ^7.0.0
  flutter_tts: ^3.8.5

  # Permissions (mic, overlay later)
  permission_handler: ^11.3.0

  # Utilities
  url_launcher: ^6.2.6

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/zeni_logo.png