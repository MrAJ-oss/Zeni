name: zeni_app
description: Zeni AI Assistant
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core
  http: ^1.2.1
  shared_preferences: ^2.2.2
  device_info_plus: ^10.1.0

  # Voice
  speech_to_text: ^7.0.0
  flutter_tts: ^3.8.5
  record: ^5.1.2

  # Connectivity
  connectivity_plus: ^6.0.3

  # File system
  path_provider: ^2.1.3

  # Permissions
  permission_handler: ^11.3.0

  # Utils
  url_launcher: ^6.2.6

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/zeni_logo.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/zeni_logo.png"